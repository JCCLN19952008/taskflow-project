<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow-Planner</title>
  <link rel="stylesheet" href="./dist/output.css">
  <link rel="stylesheet" href="style.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="app-container max-w-xl mx-auto"> 
<header class="border-t-2 border-b-2 border-black py-6 mb-8 relative">

  <!-- 🔘 Dark mode toggle -->
  <button id="darkModeToggle" class="dark-toggle">
    <i  data-lucide="moon"></i>
  </button>

  <div class=" flex flex-col items-center justify-center w-full">
    
    <h1 class="title">
      <span class="title-content">
        <i data-lucide="layout-dashboard"></i>
        <span>PLANNER</span>
      </span>
    </h1>

    <p class="subtitle">Una manera simple y sencilla de organizarte</p>

  </div>

</header>

<main>

  <!-- 🔹 QUICK ADD -->
  <section class="card">
    <form id="taskform" class="task-form">
      <input 
        id="task-input" 
        type="text" 
        placeholder="Añadir tarea rápida..." 
      >
      <select id="task-category">
    <option value="personal">Personal</option>
    <option value="trabajo">Trabajo</option>
    <option value="otros">Otros</option>
  </select>
      <button type="submit" class="btn-add">Añadir</button>
      <button type="button" id="openModal" class="btn-details">Detalles</button>
    </form>
  </section>

  <!-- 🔹 FILTERS -->
  <section class="card filters">
    <div class="filter-group">
      <span>Estado:</span>
      <button data-filter="all">Todas</button>
      <button data-filter="pending">Pendientes</button>
      <button data-filter="completed">Completadas</button>
    </div>
    </section>
    
<section class="card filters category-card">
  <div class="filter-group category-filter">
  <span>Categoría:</span>
  <button data-category="all">Todas</button>
  <button data-category="personal">Personal</button>
  <button data-category="trabajo">Trabajo</button>
  <button data-category="otros">Otros</button>
</div>
</section> 

  <div style="margin-top:10px;">
  <input 
    type="text" 
    id="searchInput" 
    placeholder="Buscar tareas..." 
    style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ccc;"
  />
</div>

  <!-- 🔹 TASK LIST -->
  <div class="section-header">
  <h2 class="section-title">
  <span>Tareas</span>
  <i data-lucide="check-square"></i>
</h2>
  <span id="task-count"></span>
</div>
<div class="task-actions">
  <label>
    <input type="checkbox" id="selectAll">
    Seleccionar todas
  </label>

  <button id="deleteSelectedBtn">
    Eliminar seleccionadas
  </button>
</div>

<ul id="tasks" class="task-list"></ul>

  <!-- 🔹 STATS -->
  <section class="card stats">
    <h2>Estadísticas</h2>
    <div class="stats-grid">
      <div>Total: <span id="total-tasks">0</span></div>
      <div>Completadas: <span id="completed-tasks">0</span></div>
      <div>Pendientes: <span id="pending-tasks">0</span></div>
      
    </div>

    <!-- Progress bar -->
    <div class="progress">
      <div id="progressBar" class="progress-fill"></div>
    </div>
  </section>

  
</main>

<div id="taskModal" class="modal hidden">
  <div class="modal-content">

    <h2>Nueva tarea</h2>
  <p id="modalHint" style="font-size:12px; opacity:0.6;"></p>

    <input id="modalTaskTitle" placeholder="Título">

    <label>Categoría</label>
    <select id="modalTaskCategory">
      <option value="personal">Personal</option>
      <option value="trabajo">Trabajo</option>
      <option value="otros">Otros</option>
    </select>

    <label>Fecha</label>
    <input type="date" id="modalTaskDate">

    <div class="modal-actions">
      <button id="saveTask">Guardar</button>
      <button id="closeModal">Cancelar</button>
    </div>

  </div>
</div>
<template id="task-template">
  <li class="task-item">
    <input type="checkbox" class="task-checkbox">
    <div class="task-content">
    <span class="task-title"></span>
    <small class="task-meta"></small>
    </div>
    <button class="delete-task">✕</button>
  </li>
</template>

<footer>

  <p>TaskFlow-Planner : Aplicación de gestión de tareas cotidianas</p>

</footer>

</div>
<script src="app.js"></script>
<script>lucide.createIcons();
</script>
</body>
</html>
