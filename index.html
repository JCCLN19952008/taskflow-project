<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow-Planner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="border-t-2 border-b-2 border-black py-6 mb-8 relative">
  


<div class="relative flex items-center justify-center w-full">

<h1 class="font-title tracking-[8px] text-2xl text-center w-full">
PLANNER
</h1>

<button id="themeToggle"
class="absolute right-4 border-2 border-black dark:border-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transiton">

<svg xmlns="http://www.w3.org/2000/svg"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor"
class="w-5 h-5">

<path stroke-linecap="round"
stroke-linejoin="round"
stroke-width="2"
d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>

</svg>

</button>

</div>

</header>

<main>

  <!-- 🔹 QUICK ADD -->
  <section class="card">
    <form id="taskform" class="task-form">
      <input 
        id="task-input" 
        type="text" 
        placeholder="Añadir tarea rápida..." 
      >
      <button type="submit">Añadir</button>
      <button type="button" id="openModal">Detalles</button>
    </form>
  </section>

  <!-- 🔹 FILTERS -->
  <section class="card filters">
    <div class="filter-group">
      <span>Estado:</span>
      <button data-filter="all">Todas</button>
      <button data-filter="pending">Pendientes</button>
      <button data-filter="completed">Completadas</button>
    </div>
  </section>

  <!-- 🔹 TASK LIST -->
  <section class="card">
    <h2>Tareas</h2>
    <ul id="tasks" class="task-list"></ul>
  </section>

  <!-- 🔹 STATS -->
  <section class="card stats">
    <h2>Estadísticas</h2>
    <div class="stats-grid">
      <div>Total: <span id="total-tasks">0</span></div>
      <div>Completadas: <span id="completed-tasks">0</span></div>
      <div>Pendientes: <span id="pending-tasks">0</span></div>
    </div>

    <!-- Progress bar -->
    <div class="progress">
      <div id="progressBar" class="progress-fill"></div>
    </div>
  </section>

  
</main>

<div id="taskModal" class="modal hidden">
  <div class="modal-content">

    <h2>Nueva tarea</h2>

    <input id="modalTaskTitle" placeholder="Título">

    <label>Categoría</label>
    <select id="modalTaskCategory">
      <option value="personal">Personal</option>
      <option value="trabajo">Trabajo</option>
      <option value="otros">Otros</option>
    </select>

    <label>Fecha</label>
    <input type="date" id="modalTaskDate">

    <div class="modal-actions">
      <button id="saveTask">Guardar</button>
      <button id="closeModal">Cancelar</button>
    </div>

  </div>
</div>
<template id="task-template">
  <li class="task-item">
    <input type="checkbox" class="task-checkbox">
    <span class="task-title"></span>
    <button class="delete-task">✕</button>
  </li>
</template>

<footer>

  <p>TaskFlow-Planner : Aplicación de gestión de tareas cotidianas</p>

</footer>

<script src="app.js"></script>

</body>
</html>
