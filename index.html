<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow-Planner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  class="border-t-2 border-b-2 border-black dark:border-white py-6 mb-8 relative">


<div class="relative flex items-center justify-center w-full">

<h1 class="font-title tracking-[8px] text-2xl text-center w-full">
PLANNER
</h1>

<button id="themeToggle"
class="absolute right-4 border-2 border-black dark:border-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transiton">

<svg xmlns="http://www.w3.org/2000/svg"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor"
class="w-5 h-5">

<path stroke-linecap="round"
stroke-linejoin="round"
stroke-width="2"
d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>

</svg>

</button>

</div>

</header>

<main>

  <!-- Formulario para ir añadiendo las tareas -->
  <section class="taskform-section">

<div class="flex flex-col gap-4 mb-6">
    <form id="taskform">

      <label for="task-input">Cual sera la tarea?</label>

      <input
        type="text"
        id="task-input"
        name="task"
        placeholder="Describe la tarea"
        required
      >

      <button id="openModal"
class="border-2 border-black dark:border-white rounded-lg px-2 py-[3px] text-sm md:text-base font-title hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition">
Añadir la tarea
</button>

<button id="searchButton"
class="w-8 h-8 md:w-10 md:h-10 border-2 border-black dark:border-white rounded-full flex items-center justify-center hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition">

<svg viewBox="0 0 24 24" fill="none" class="w-4 h-4">
<circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
<line x1="16.65" y1="16.65" x2="21" y2="21" stroke="currentColor" stroke-width="2"/>
</svg>

</button>

    </form>
    
</div>
  </section>


  <!-- Lista de las tareas que van siendo añadidas -->
  <section class="tasklist-section">

    

<!-- Filtros -->

<div id="filtersBar"
class="flex items-center justify-center gap-2 flex-nowrap w-full">

<button data-filter="all"
class="border-2 border-black dark:border-white rounded-lg px-2 py-[3px] text-sm md:text-base font-title hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition">
Todas
</button>

<button data-filter="all"
class="border-2 border-black dark:border-white rounded-lg px-2 py-[3px] text-sm md:text-base font-title hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition">
Pendientes
</button>

<button data-filter="completed"
class="border-2 border-black dark:border-white rounded-lg px-2 py-[3px] text-sm md:text-base font-title hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition">
Completadas
</button>

<div class="relative flex flex-col items-center">

<button id="categoryButton"
class="border-2 border-black dark:border-white rounded-lg px-2 py-[3px] text-sm md:text-base font-title hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition">
Categorías
</button>

<select id="categorySelect"
class="hidden absolute top-full mt-2 border-2 border-black dark:border-white rounded-xl px-3 py-1 bg-[#f6f2ef] dark:bg-[#121212]">

<option value="all">Todas</option>
<option value="personal">Personal</option>
<option value="trabajo">Trabajo</option>
<option value="otros">Otros</option>

</select>

</div>

<input
type="text"
id="searchInput"
class="hidden border-2 border-black dark:border-white rounded-xl px-3 py-2 bg-transparent mt-3 mb-6 w-full pointer-events-none"
placeholder="Buscar tarea..."
>

</div>

</div>

<!-- Buscador -->

<ul id="tasks" class="space-y-4"></ul>

  </section>

</main>


<!-- Panel que mostrara las estadisticas segun tareas se completen o añadan -->
<aside>

  <h2>Estadisticas de tus tareas</h2>

  <ul>

    <li>Total de tareas: <span id="total-tasks">0</span></li>

    <li>Tareas completadas: <span id="completed-tasks">0</span></li>

    <li>Tareas pendientes: <span id="pending-tasks">0</span></li>

  </ul>
<div class="mt-4">

  <div class="w-full h-3 border-2 border-black dark:border-white rounded-full overflow-hidden">

    <div id="progressBar"
    class="h-full bg-black dark:bg-white transition-all duration-300"
    style="width:0%">
    </div>

  </div>

</div>
</aside>

<div id="taskModal"
class="modal hidden fixed inset-0 bg-black/40 flex items-center justify-center">

<div class="bg-white dark:bg-[#1f1f1f] rounded-[20px] p-6 flex flex-col gap-3 w-[320px]">

<h2 class="font-title text-lg">Nueva tarea</h2>

<input
id="modalTaskTitle"
type="text"
placeholder="Título de la tarea"
class="border-2 border-black dark:border-white rounded-lg px-2 py-1 bg-transparent">

<label>Categoría</label>

<select id="modalTaskCategory"
class="border-2 border-black dark:border-white rounded-lg px-2 py-1 bg-transparent">

<option value="personal">Personal</option>
<option value="trabajo">Trabajo</option>
<option value="otros">Otros</option>

</select>

<label>Fecha prevista</label>

<input
id="modalTaskDate"
type="date"
class="border-2 border-black dark:border-white rounded-lg px-2 py-1 bg-transparent">

<div class="flex justify-between mt-2">

<button id="saveTask"
class="border-2 border-black dark:border-white rounded-xl px-3 py-1">
Guardar
</button>

<button id="closeModal"
class="border-2 border-black dark:border-white rounded-xl px-3 py-1">
Cancelar
</button>

</div>

</div>

</div>


<footer>

  <p>TaskFlow-Planner : Aplicación de gestión de tareas cotidianas</p>

</footer>


<!-- Template para cada tarea -->
<template id="task-template">

  <li class="task-item">

    <input type="checkbox" class="task-checkbox">

    <span class="task-title"></span>

    <button class="delete-task">Borrar</button>

  </li>

</template>


<script src="app.js"></script>

</body>
</html>
